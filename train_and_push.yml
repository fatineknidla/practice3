name: Train & Push to Hugging Face

on:
  # Run manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of trees in the Random Forest"
        required: false
        default: "100"
        type: string
      test_size:
        description: "Fraction of data reserved for testing (0.0–1.0)"
        required: false
        default: "0.2"
        type: string
      repo_id:
        description: "Hugging Face repo id (e.g. your-username/iris-classifier)"
        required: true
        type: string
      run_name:
        description: "Friendly name for this run"
        required: false
        default: "iris-run"
        type: string

  # Also run automatically on every push to main
  push:
    branches:
      - main
    paths:
      - "train.py"
      - "requirements.txt"

# Only allow one training run at a time
concurrency:
  group: train-and-push
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    outputs:
      validated: ${{ steps.check.outputs.result }}
    steps:
      - name: Check numeric inputs
        id: check
        run: |
          N="${{ inputs.n_estimators || '100' }}"
          T="${{ inputs.test_size    || '0.2' }}"

          if ! [[ "$N" =~ ^[0-9]+$ ]] || [ "$N" -le 0 ]; then
            echo "::error::n_estimators must be a positive integer (got: $N)"
            exit 1
          fi

          # test_size must be a float between 0 and 1
          if ! python3 -c "v=float('$T'); assert 0 < v < 1" 2>/dev/null; then
            echo "::error::test_size must be a float strictly between 0 and 1 (got: $T)"
            exit 1
          fi

          echo "result=ok" >> "$GITHUB_OUTPUT"
          echo "✅ Inputs are valid"

  # ────────────────────────────────────────────────────────────────────────────
  train-and-push:
    name: Train model & push to HF Hub
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      OUTPUT_DIR: model_output

    steps:
      # 1 ── Guard: make sure the secret is present ───────────────────────────
      - name: Check required secrets
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN must be added as a repository secret."
            echo "Go to  Settings → Secrets → Actions → New repository secret"
            exit 1
          fi

      # 2 ── Source code ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 3 ── Python environment ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify installation
        run: |
          python -c "import sklearn; print('sklearn', sklearn.__version__)"
          python -c "import huggingface_hub; print('huggingface_hub', huggingface_hub.__version__)"

      # 4 ── Train ─────────────────────────────────────────────────────────────
      - name: Train Iris classifier
        run: |
          python train.py \
            --output-dir "$OUTPUT_DIR" \
            --n-estimators ${{ inputs.n_estimators || '100' }} \
            --test-size    ${{ inputs.test_size    || '0.2' }} \
            2>&1 | tee training.log

      # 5 ── Sanity-check the output ───────────────────────────────────────────
      - name: Validate model artefacts
        run: |
          for f in model.pkl scaler.pkl metrics.json README.md; do
            if [ ! -f "$OUTPUT_DIR/$f" ]; then
              echo "::error::Expected artefact missing: $OUTPUT_DIR/$f"
              exit 1
            fi
          done

          ACCURACY=$(python3 -c "import json; m=json.load(open('$OUTPUT_DIR/metrics.json')); print(m['accuracy'])")
          echo "Model accuracy: $ACCURACY"

          # Fail if accuracy is suspiciously low (< 0.5)
          python3 -c "
          import json, sys
          m = json.load(open('$OUTPUT_DIR/metrics.json'))
          if m['accuracy'] < 0.5:
              print(f'::error::Accuracy {m[\"accuracy\"]} is below 0.5 — something looks wrong.')
              sys.exit(1)
          print(f'Accuracy check passed: {m[\"accuracy\"]}')
          "

      # 6 ── Upload artefacts to GitHub (for debugging / auditing) ─────────────
      - name: Upload training artefacts
        uses: actions/upload-artifact@v4
        with:
          name: iris-model-${{ github.run_id }}
          path: |
            ${{ env.OUTPUT_DIR }}/
            training.log
          retention-days: 14

      # 7 ── Push to Hugging Face Hub ──────────────────────────────────────────
      - name: Push model to Hugging Face Hub
        run: |
          REPO="${{ inputs.repo_id }}"

          # When triggered by a push (no manual inputs), skip HF upload
          # unless REPO is still configured as a default in your repo vars
          if [ -z "$REPO" ]; then
            echo "No repo_id provided — skipping Hugging Face upload."
            exit 0
          fi

          python train.py \
            --output-dir "$OUTPUT_DIR" \
            --n-estimators ${{ inputs.n_estimators || '100' }} \
            --test-size    ${{ inputs.test_size    || '0.2' }} \
            --push-to-hub \
            --repo-id      "$REPO"

      # 8 ── Job summary ────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os
          from pathlib import Path

          summary_lines = [
              "## 🌸 Iris Classifier – Training Summary",
              "",
              f"| Key | Value |",
              f"|-----|-------|",
              f"| Run ID | {os.environ.get('GITHUB_RUN_ID', 'N/A')} |",
              f"| n_estimators | ${{ inputs.n_estimators || '100' }} |",
              f"| test_size | ${{ inputs.test_size || '0.2' }} |",
          ]

          metrics_path = Path("model_output/metrics.json")
          if metrics_path.exists():
              m = json.loads(metrics_path.read_text())
              summary_lines += [
                  f"| Accuracy | **{m['accuracy']:.4f}** |",
                  f"| Train samples | {m['train_samples']} |",
                  f"| Test samples | {m['test_samples']} |",
              ]
          else:
              summary_lines.append("| Metrics | not available |")

          repo = "${{ inputs.repo_id }}"
          if repo:
              summary_lines += [
                  "",
                  f"**Hugging Face repo:** https://huggingface.co/{repo}",
              ]

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(summary_lines) + "\n")

          print("Summary written.")
          EOF
